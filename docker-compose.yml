services:
  zpool-monitor:
    build: .
    container_name: zpool-monitor
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:      
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - PYTHONIOENCODING=utf-8
      - PYTHONUTF8=1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"